<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merch — 600 000 000 000</title>
    <link rel="icon" href="assets/600_small.png" type="image/png">
    <style>
        @font-face {
            font-family: 'Alfa Slab One';
            font-style: normal;
            font-weight: 400;
            font-display: swap;
            src: url('assets/AlfaSlabOne.ttf') format('truetype');
        }

        @font-face {
            font-family: 'Anton';
            font-style: normal;
            font-weight: 400;
            font-display: swap;
            src: url('assets/Anton.ttf') format('truetype');
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #f7921a;
            color: #111;
            font-family: "Trebuchet MS", "Helvetica Neue", Arial, sans-serif;
            overflow-x: hidden;
        }

        @keyframes stoneSpin {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }

        @keyframes stoneFadeOut {
            0%   { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.6); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        .intro-stone-wrap {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 100;
        }

        .intro-stone {
            width: clamp(133px, 21vw, 246px);
            height: clamp(133px, 21vw, 246px);
            object-fit: contain;
            animation: stoneSpin 1.2s linear, stoneFadeOut 0.3s ease forwards 1.1s;
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 50;
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            padding: 20px 24px;
            opacity: 0;
            animation: fadeIn 0.6s ease forwards 1.4s;
        }

        nav a,
        nav a:visited {
            font-family: 'Anton', sans-serif;
            font-size: 14px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            text-decoration: none;
            color: white;
            background: rgba(0, 0, 0, 0.55);
            padding: 10px 18px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            transition: background 0.2s, color 0.2s;
        }

        nav a:hover {
            background: #111;
            color: #f7921a;
        }

        .page-content {
            opacity: 0;
            animation: fadeIn 0.6s ease forwards 1.4s;
            padding-top: 100px;
            padding-bottom: 80px;
        }

        .page-header {
            background: #111;
            text-align: center;
            padding: 80px 24px 60px;
        }

        .page-header h1 {
            font-family: 'Alfa Slab One', serif;
            font-size: clamp(72px, 18vw, 160px);
            line-height: 0.88;
            color: #f7921a;
            letter-spacing: 0.02em;
        }

        .merch-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 32px;
            max-width: 1100px;
            margin: 0 auto;
            padding: 64px 24px;
        }

        .merch-item {
            background: #111;
            width: 300px;
            flex-shrink: 0;
        }

        .merch-item-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            display: block;
            background: #222;
        }

        .merch-item-body {
            padding: 20px 24px 24px;
        }

        .merch-item-name {
            font-family: 'Anton', sans-serif;
            font-size: 22px;
            letter-spacing: 0.1em;
            color: white;
            text-transform: uppercase;
            line-height: 1.1;
            margin-bottom: 6px;
        }

        .merch-item-price {
            font-family: 'Anton', sans-serif;
            font-size: 16px;
            letter-spacing: 0.12em;
            color: #f7921a;
            margin-bottom: 18px;
        }

        .merch-item-btn {
            display: inline-block;
            background: #f7921a;
            color: #111;
            font-family: 'Anton', sans-serif;
            font-size: 14px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            text-decoration: none;
            padding: 12px 28px;
            transition: background 0.2s, color 0.2s;
        }

        .merch-item-btn:hover {
            background: white;
            color: #111;
        }

        @media (max-width: 480px) {
            nav { padding: 14px 16px; }
            nav a { font-size: 12px; padding: 8px 14px; }
            .merch-item { width: 100%; max-width: 340px; }
        }
    </style>
</head>
<body>
    <div class="intro-stone-wrap">
        <img src="assets/sacred-stone.webp" alt="" class="intro-stone">
    </div>
    <nav>
        <a href="merch.html">Merch</a>
        <a href="party.html">Party</a>
    </nav>
    <div class="page-content">
        <div class="page-header">
            <h1>MERCH</h1>
        </div>
        <div class="merch-grid">
            <!-- merch items go here -->
        </div>
    </div>
</body>
</html>
